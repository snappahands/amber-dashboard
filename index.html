<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amber's Dashboard — Deako Builder Accounts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0d1117;font-family:system-ui,-apple-system,sans-serif;color:#c9d1d9;overflow:hidden}
body{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#header{background:#161b22;border-bottom:1px solid #21262d;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
#header h1{font-size:17px;font-weight:700;color:#e6edf3;letter-spacing:.02em;white-space:nowrap}
.header-sub{font-size:11px;color:#8b949e;background:#0d1117;padding:2px 8px;border-radius:10px;font-weight:600}
#search{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 12px;color:#c9d1d9;font-size:13px;width:180px;outline:none;margin-left:auto}
#search:focus{border-color:#7ecfe0}
#filter-bse{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#c9d1d9;font-size:13px;outline:none;cursor:pointer}

/* SAVE STATUS */
#save-status{font-size:12px;padding:4px 10px;border-radius:12px;font-weight:600;letter-spacing:.03em;display:flex;align-items:center;gap:5px;white-space:nowrap}
#save-status.idle{background:#161b22;color:#484f58;border:1px solid #21262d}
#save-status.saving{background:#0d2137;color:#79c0ff;border:1px solid #1a3a6d}
#save-status.saved{background:#0d2b0d;color:#3fb950;border:1px solid #1a4d1a}
#save-status.error{background:#2d0d0d;color:#f85149;border:1px solid #4d1a1a;cursor:pointer}
#deploy-btn{background:#0d2b0d;border:1px solid #1a4d1a;border-radius:6px;padding:5px 10px;color:#3fb950;font-size:11px;font-weight:600;cursor:pointer}
#deploy-btn:hover{border-color:#3fb950;color:#56d971}
#deploy-btn:disabled{opacity:.5;cursor:default}
#token-btn{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:5px 10px;color:#8b949e;font-size:11px;cursor:pointer}
#token-btn:hover{border-color:#7ecfe0;color:#7ecfe0}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:210px;flex-shrink:0;background:#161b22;border-right:1px solid #21262d;overflow-y:auto;padding:6px 0}
.builder-item{padding:9px 14px 9px 10px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;font-size:12px;color:#8b949e;line-height:1.3;display:flex;align-items:flex-start;gap:6px;user-select:none}
.builder-item:hover{background:#1c2128;color:#c9d1d9}
.builder-item.active{background:#1c2128;border-left-color:#7ecfe0;color:#e6edf3;font-weight:600}
.drag-handle{color:#30363d;font-size:11px;margin-top:1px;flex-shrink:0;cursor:grab;line-height:1}
.builder-item:hover .drag-handle{color:#484f58}
.builder-item.dragging{opacity:.4}
.builder-item.drag-over{border-top:2px solid #7ecfe0;background:#1c2128}
.bse-tag{font-size:10px;padding:1px 5px;border-radius:3px;margin-top:3px;display:inline-block;font-weight:700;letter-spacing:.03em}
.tag-amber{background:#2d1f00;color:#f0a500}
.tag-justin{background:#0d2137;color:#4fa8d5}
.sidebar-count{padding:8px 14px 4px;font-size:10px;color:#484f58;letter-spacing:.06em;text-transform:uppercase}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px;background:#0d1117}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:#484f58;font-size:15px}

/* BUILDER HEADER */
.b-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.b-name{font-size:22px;font-weight:700;color:#e6edf3;line-height:1.2}
.b-location{font-size:13px;color:#8b949e;margin-top:3px}
.b-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.badge-amber{background:#2d1f00;color:#f0a500;border:1px solid #4a3200}
.badge-justin{background:#0d2137;color:#4fa8d5;border:1px solid #153a5a}
.badge-completed{background:#0d2b0d;color:#3fb950;border:1px solid #1a4d1a}
.badge-pilot{background:#2d1a2d;color:#d2a8ff;border:1px solid #4d2a6d}
.badge-active{background:#0d2137;color:#79c0ff;border:1px solid #1a3a6d}
.badge-expired{background:#2d0d0d;color:#f85149;border:1px solid #4d1a1a}
.badge-expiring{background:#2d1f00;color:#f0a500;border:1px solid #4a3200}
.badge-nocontract{background:#21262d;color:#8b949e;border:1px solid #30363d}

/* METRICS */
.metrics{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.metric-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:11px 14px;min-width:100px;flex:1}
.metric-card.missing{background:#2d0d0d;border-color:#f85149;}
.metric-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;white-space:nowrap}
.metric-value{font-size:20px;font-weight:700;color:#e6edf3}
.metric-value.blue{color:#7ecfe0}
.metric-value.green{color:#3fb950}
.metric-value.empty{color:#484f58;font-size:14px;font-weight:400}

/* STATUS CARD */
.status-card{background:#161b22;border:1px solid #30363d;border-left:3px solid #f0a500;border-radius:8px;padding:14px 16px;margin-bottom:16px}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;font-weight:700}
.status-card .card-title{color:#f0a500}

/* INFO GRID */
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:16px}
.info-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px 16px}
.info-card .card-title{color:#8b949e}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #0d1117}
.info-row:last-child{border-bottom:none}
.info-key{font-size:11px;color:#8b949e;flex-shrink:0;max-width:50%}

/* FULL CARDS */
.full-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px 16px;margin-bottom:12px}
.full-card .card-title{margin-bottom:8px}
.full-card.packs{border-left:3px solid #8957e5}
.full-card.packs .card-title{color:#d2a8ff}
.full-card.ec{border-left:3px solid #9e6a03}
.full-card.ec .card-title{color:#e3b341}
.full-card.integrator{border-left:3px solid #58a6ff}
.full-card.integrator .card-title{color:#79c0ff}
.full-card.opportunity{border-left:3px solid #3fb950}
.full-card.opportunity .card-title{color:#3fb950}
.full-card.notes{border-left:3px solid #258bbd}
.full-card.notes .card-title{color:#79c0ff}
.info-card.acct-details{border-left:3px solid #6e7681}
.info-card.acct-details .card-title{color:#a0aab4}
.info-card.acct-contacts{border-left:3px solid #c778dd}
.info-card.acct-contacts .card-title{color:#d9a0e8}
.info-card.homeowner{border-left:3px solid #2ea9a9}
.info-card.homeowner .card-title{color:#56d4cc}
.info-card.trade{border-left:3px solid #d4782a}
.info-card.trade .card-title{color:#f0a040}

/* EDITABLE */
[contenteditable]{outline:none;border-radius:4px;transition:background .12s,box-shadow .12s,border-color .12s;cursor:text;min-width:24px}
[contenteditable]:focus{background:rgba(126,207,224,0.08);box-shadow:0 0 0 2px rgba(126,207,224,0.5);border-radius:4px}

/* inline (single-line values in info rows) */
.editable-inline{
  display:inline-block;font-size:12px;color:#c9d1d9;text-align:right;
  word-break:break-word;line-height:1.4;
  border-bottom:1px dashed #30363d;padding:1px 2px;
  min-width:28px;
}
.editable-inline:hover{border-bottom-color:#7ecfe0;background:rgba(126,207,224,0.06)}
.editable-inline:focus{border-bottom-color:transparent}
.editable-inline:empty::before{content:attr(data-placeholder);color:#484f58;font-style:italic}

/* multi-line (large text blocks) */
.editable-multi{
  display:block;width:100%;font-size:13px;color:#c9d1d9;
  line-height:1.65;white-space:pre-wrap;
  border:1px dashed #21262d;border-radius:6px;padding:6px 8px;
}
.editable-multi:hover{border-color:#7ecfe0;background:rgba(126,207,224,0.04)}
.editable-multi:focus{border-color:rgba(126,207,224,0.5);background:rgba(126,207,224,0.06)}
.editable-multi:empty::before{content:attr(data-placeholder);color:#484f58;font-style:italic}

/* metric value inline */
.metric-value[contenteditable]{
  display:block;border-bottom:1px dashed #30363d;padding:1px 2px;
}
.metric-value[contenteditable]:hover{border-bottom-color:#7ecfe0}
.metric-value[contenteditable]:focus{border-bottom-color:transparent}
.metric-value.empty[contenteditable]::before{content:'—';color:#484f58}
.metric-value.empty[contenteditable]:focus::before{content:''}

/* builder name editable */
.b-name[contenteditable]{border-bottom:1px dashed #30363d}
.b-name[contenteditable]:hover{border-bottom-color:#7ecfe0}
.b-name[contenteditable]:focus{border-bottom-color:transparent}

/* YES/NO coloring */
.editable-inline.yes{color:#3fb950}
.editable-inline.no{color:#f85149}
.editable-inline.tbd{color:#f0a500}
.editable-inline.partial{color:#e3b341}

/* VERSION BADGE */
#version-badge{position:fixed;bottom:10px;right:14px;font-size:14px;font-weight:700;color:#7ecfe0;background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:4px 12px;z-index:100;pointer-events:none}

/* TOKEN MODAL */
#token-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center}
#token-modal.open{display:flex}
.modal-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:28px;max-width:440px;width:90%}
.modal-box h2{font-size:16px;font-weight:700;color:#e6edf3;margin-bottom:10px}
.modal-box p{font-size:13px;color:#8b949e;line-height:1.6;margin-bottom:16px}
.modal-box input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:13px;outline:none;margin-bottom:14px}
.modal-box input:focus{border-color:#7ecfe0}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-primary{background:#238636;border:none;border-radius:6px;padding:7px 16px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#2ea043}
.btn-secondary{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:7px 16px;color:#c9d1d9;font-size:13px;cursor:pointer}
.btn-secondary:hover{background:#30363d}
.modal-link{color:#79c0ff;text-decoration:none;font-size:12px}
.modal-link:hover{text-decoration:underline}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
</style>
</head>
<body>

<div id="header">
  <h1>Amber's Dashboard</h1>
  <span class="header-sub">Deako Builder Accounts</span>
  <select id="filter-bse" onchange="renderSidebar()">
    <option value="">All BSEs</option>
    <option value="Amber">Amber</option>
    <option value="Justin">Justin</option>
  </select>
  <input id="search" type="text" placeholder="Search builders..." oninput="renderSidebar()">
  <div id="save-status" class="idle">● Saved</div>
  <button id="deploy-btn" onclick="pushLayout()" title="Push index.html to GitHub so colleagues see latest version">↑ Deploy Layout</button>
  <button id="token-btn" onclick="openTokenModal()" title="Configure GitHub token for auto-save">⚙ GitHub</button>
</div>

<div id="main">
  <div id="sidebar"></div>
  <div id="content"><div class="empty-state">← Select a builder</div></div>
</div>

<div id="version-badge">v2.3</div>

<!-- Token Setup Modal -->
<div id="token-modal">
  <div class="modal-box">
    <h2>Connect to GitHub</h2>
    <p>To auto-save edits directly to GitHub, enter a Personal Access Token with <strong>Contents: Read &amp; Write</strong> permission for the <code>snappahands/amber-dashboard</code> repo.<br><br>
    <a class="modal-link" href="https://github.com/settings/personal-access-tokens/new" target="_blank">Create a fine-grained token →</a></p>
    <input id="token-input" type="password" placeholder="github_pat_..." autocomplete="off">
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeTokenModal()">Cancel</button>
      <button class="btn-primary" onclick="saveToken()">Save Token</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
const REPO_OWNER = 'snappahands';
const REPO_NAME  = 'amber-dashboard';
const FILE_PATH  = 'data.js';

let selectedIdx  = null;
let _saveTimer   = null;
let _fileSHA     = null;   // cached from last GitHub fetch

/* ── HELPERS ── */
function bse(b){ return (b['Builder Success Executive']||'').trim(); }
function v(b,k){ return (b[k]||'').trim(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseEndDate(s){
  s=s.trim();
  const m=s.match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/);
  if(!m) return null;
  let y=parseInt(m[3]); if(y<100) y+=2000;
  return new Date(y,parseInt(m[1])-1,parseInt(m[2]));
}

function contractInfo(b){
  const c=v(b,'Contract Start/Expiration date');
  if(!c) return {status:'none',text:''};
  if(c==='Pilot') return {status:'pilot',text:'Pilot'};
  if(c.toLowerCase().includes('no contract')) return {status:'nocontract',text:'No Contract'};
  const parts=c.split(/[-–]/);
  if(parts.length>=2){
    const d=parseEndDate(parts[parts.length-1]);
    if(d){
      const now=new Date(), soon=new Date(); soon.setMonth(soon.getMonth()+3);
      if(d<now) return {status:'expired',text:c};
      if(d<soon) return {status:'expiring',text:c};
      return {status:'active',text:c};
    }
  }
  return {status:'active',text:c};
}

/* ── SIDEBAR ── */
function renderSidebar(){
  const q=document.getElementById('search').value.toLowerCase();
  const bseFilter=document.getElementById('filter-bse').value;
  const filtered=BUILDERS.map((b,i)=>({b,i})).filter(({b})=>{
    if(bseFilter && !bse(b).toLowerCase().includes(bseFilter.toLowerCase())) return false;
    if(q && !b.name.toLowerCase().includes(q)) return false;
    return true;
  });
  let html=`<div class="sidebar-count">${filtered.length} Builder${filtered.length!==1?'s':''}</div>`;
  filtered.forEach(({b,i})=>{
    const bv=bse(b);
    const tc=bv==='Amber'?'tag-amber':bv==='Justin'?'tag-justin':'';
    html+=`<div class="builder-item${i===selectedIdx?' active':''}" onclick="selectBuilder(${i})"
      draggable="true" data-idx="${i}"
      ondragstart="onDragStart(event,${i})"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,${i})"
      ondragend="onDragEnd(event)">
      <span class="drag-handle">⠿</span>
      <div><div>${esc(b.name)}</div>${bv?`<span class="bse-tag ${tc}">${esc(bv)}</span>`:''}</div>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML=html;
}

function selectBuilder(idx){
  selectedIdx=idx;
  renderSidebar();
  renderDetail(BUILDERS[idx]);
  document.getElementById('content').scrollTop=0;
}

/* ── DRAG TO REORDER ── */
let _dragIdx=null;

function onDragStart(e,idx){
  _dragIdx=idx;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.target.classList.add('dragging'),0);
}

function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}

function onDragEnd(e){
  e.target.classList.remove('dragging');
  document.querySelectorAll('.builder-item').forEach(el=>el.classList.remove('drag-over'));
}

function onDrop(e,targetIdx){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(_dragIdx===null||_dragIdx===targetIdx){_dragIdx=null;return;}
  const item=BUILDERS.splice(_dragIdx,1)[0];
  BUILDERS.splice(targetIdx,0,item);
  // keep selection tracking correct
  if(selectedIdx===_dragIdx) selectedIdx=targetIdx;
  else if(selectedIdx!==null){
    if(_dragIdx<selectedIdx&&targetIdx>=selectedIdx) selectedIdx--;
    else if(_dragIdx>selectedIdx&&targetIdx<=selectedIdx) selectedIdx++;
  }
  _dragIdx=null;
  renderSidebar();
  scheduleSave();
}

/* ── EDITABLE ELEMENTS ── */
// Called on input event from any contenteditable
function onEdit(el){
  const idx=parseInt(el.dataset.idx);
  const field=el.dataset.field;
  BUILDERS[idx][field]=el.innerText;

  // Re-color yes/no inline values
  if(el.classList.contains('editable-inline')) colorInline(el);

  // Rebuild sidebar if name or BSE changed
  if(field==='name' || field==='Builder Success Executive') renderSidebar();

  scheduleSave();
}

function colorInline(el){
  const low=el.innerText.toLowerCase().trim();
  el.classList.remove('yes','no','tbd','partial');
  if(low==='yes'||low==='completed') el.classList.add('yes');
  else if(low==='no') el.classList.add('no');
  else if(low==='tbd') el.classList.add('tbd');
  else if(low==='partial'||low==='in process'||low==='needed') el.classList.add('partial');
}

function eInline(idx, field, placeholder=''){
  const val=BUILDERS[idx][field]||'';
  const low=val.toLowerCase().trim();
  let cls='editable-inline';
  if(low==='yes'||low==='completed') cls+=' yes';
  else if(low==='no') cls+=' no';
  else if(low==='tbd') cls+=' tbd';
  else if(low==='partial'||low==='in process'||low==='needed') cls+=' partial';
  return `<span class="${cls}" contenteditable="true" data-idx="${idx}" data-field="${esc(field)}" data-placeholder="${esc(placeholder)}" oninput="onEdit(this)">${esc(val)}</span>`;
}

function eMulti(idx, field, placeholder=''){
  const val=BUILDERS[idx][field]||'';
  return `<div class="editable-multi" contenteditable="true" data-idx="${idx}" data-field="${esc(field)}" data-placeholder="${esc(placeholder)}" oninput="onEdit(this)">${esc(val)}</div>`;
}

function eMetric(idx, field, cls=''){
  const val=BUILDERS[idx][field]||'';
  const empty=!val;
  return `<div class="metric-value${empty?' empty':''} ${cls}" contenteditable="true" data-idx="${idx}" data-field="${esc(field)}" oninput="onEdit(this)">${esc(val)}</div>`;
}

function mCard(idx, label, field, valCls=''){
  const missing=!(BUILDERS[idx][field]||'').trim();
  return `<div class="metric-card${missing?' missing':''}"><div class="metric-label">${label}</div>${eMetric(idx,field,valCls)}</div>`;
}

/* ── RENDER DETAIL ── */
function renderDetail(b){
  const idx=selectedIdx;
  const bv=bse(b);
  const bClass=bv==='Amber'?'badge badge-amber':bv==='Justin'?'badge badge-justin':'';
  const ci=contractInfo(b);
  const sb={
    active:`<span class="badge badge-active">${esc(ci.text)}</span>`,
    expiring:`<span class="badge badge-expiring">⚠ EXPIRING: ${esc(ci.text)}</span>`,
    expired:`<span class="badge badge-expired">EXPIRED: ${esc(ci.text)}</span>`,
    pilot:'<span class="badge badge-pilot">PILOT</span>',
    nocontract:'<span class="badge badge-nocontract">NO CONTRACT</span>',
    none:''
  };
  const onbBadge=v(b,'Onboarding Status')==='Completed'?'<span class="badge badge-completed">ONBOARDED</span>':'';

  document.getElementById('content').innerHTML = `
    <div class="b-header">
      <div>
        <div class="b-name" contenteditable="true" data-idx="${idx}" data-field="name" oninput="onEdit(this)">${esc(b.name)}</div>
        <div class="b-location">${eInline(idx,'Locations','Location')}</div>
        <div class="b-badges">
          ${bv?`<span class="${bClass}">BSE: ${eInline(idx,'Builder Success Executive','BSE')}</span>`:''}
          ${sb[ci.status]||''}
          ${onbBadge}
        </div>
      </div>
    </div>

    <div class="metrics">
      ${mCard(idx,'Annual Starts','Annual Home Starts','blue')}
      ${mCard(idx,'2025 Starts w/Deako','2025 Starts w Deako')}
      ${mCard(idx,'2026 Starts w/Deako','2026 Starts w Deako')}
      ${mCard(idx,'2026 Closes w/Deako','2026 Closes w Deako')}
      ${mCard(idx,'Q4 2024 Starts','Q4 2024 Starts w Deako')}
      ${mCard(idx,'Monthly Rev','Mothly Revenue','green')}
      ${mCard(idx,'Annual Rev','Annual Revenue','green')}
      ${mCard(idx,'Pack Revenue','Standard Pack Revenue','green')}
    </div>

    <div class="status-card">
      <div class="card-title">Status Update</div>
      ${eMulti(idx,'Status Update','Enter status update...')}
    </div>

    <div class="section-grid">
      <div class="info-card acct-details">
        <div class="card-title">Account Details</div>
        ${iRow('Contract', eInline(idx,'Contract Start/Expiration date','e.g. 1.1.25-12.31.27'))}
        ${iRow('Notes Updated', eInline(idx,'Notes Updated','date'))}
        ${iRow('First PO', eInline(idx,'First PO completed','Yes/No'))}
        ${iRow('Onboarding', eInline(idx,'Onboarding Status','status'))}

/* ── AUTO-SAVE ── */
function scheduleSave(){
  setSaveStatus('saving');
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(pushToGitHub, 1500);
}

function setSaveStatus(state, msg){
  const el=document.getElementById('save-status');
  el.className='';
  el.classList.add(state);
  const labels={
    idle:'● Saved',
    saving:'↑ Saving…',
    saved:'✓ Saved to GitHub',
    error:'✕ Save failed — click to retry'
  };
  el.textContent=msg||labels[state];
  if(state==='saved') setTimeout(()=>setSaveStatus('idle'),3000);
  if(state==='error') el.onclick=pushToGitHub;
  else el.onclick=null;
}

function getToken(){ return localStorage.getItem('gh_token')||''; }

async function pushToGitHub(){
  const token=getToken();
  if(!token){ setSaveStatus('error','✕ No GitHub token — click ⚙ to configure'); return; }

  try {
    // 1. Get current SHA (use cached if fresh enough)
    if(!_fileSHA){
      const r=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,{
        headers:{Authorization:`token ${token}`, Accept:'application/vnd.github+json'}
      });
      if(!r.ok) throw new Error('Could not fetch file from GitHub');
      const meta=await r.json();
      _fileSHA=meta.sha;
    }

    // 2. Build updated data.js content
    const content='const BUILDERS = '+JSON.stringify(BUILDERS)+';\n';

    // 3. Base64 encode (UTF-8 safe)
    const encoded=btoa(unescape(encodeURIComponent(content)));

    // 4. Push commit
    const now=new Date();
    const ts=now.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    const putRes=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,{
      method:'PUT',
      headers:{Authorization:`token ${token}`, 'Content-Type':'application/json', Accept:'application/vnd.github+json'},
      body:JSON.stringify({
        message:`Dashboard edit: auto-saved ${ts}`,
        content:encoded,
        sha:_fileSHA
      })
    });

    if(!putRes.ok){
      const err=await putRes.json();
      // SHA stale — clear and retry once
      if(putRes.status===409||putRes.status===422){
        _fileSHA=null;
        await pushToGitHub();
        return;
      }
      throw new Error(err.message||putRes.statusText);
    }

    const result=await putRes.json();
    _fileSHA=result.content.sha;
    setSaveStatus('saved');

  } catch(e) {
    console.error('GitHub save error:', e);
    setSaveStatus('error', '✕ '+(e.message||'Save failed'));
  }
}

/* ── DEPLOY LAYOUT ── */
let _htmlSHA = null;

async function pushLayout(){
  const token=getToken();
  if(!token){ openTokenModal(); return; }
  const btn=document.getElementById('deploy-btn');
  btn.textContent='↑ Deploying…';
  btn.disabled=true;
  try {
    // 1. Get current SHA of index.html
    if(!_htmlSHA){
      const r=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`,{
        headers:{Authorization:`token ${token}`, Accept:'application/vnd.github+json'}
      });
      if(!r.ok) throw new Error('Could not fetch index.html from GitHub');
      const meta=await r.json();
      _htmlSHA=meta.sha;
    }
    // 2. Fetch the raw local file content via XHR (works on file:// and Pages)
    const raw=await fetch('index.html').then(r=>r.text());
    const encoded=btoa(unescape(encodeURIComponent(raw)));
    const now=new Date();
    const ts=now.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    const putRes=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`,{
      method:'PUT',
      headers:{Authorization:`token ${token}`,'Content-Type':'application/json',Accept:'application/vnd.github+json'},
      body:JSON.stringify({message:`Layout deploy: ${ts}`,content:encoded,sha:_htmlSHA})
    });
    if(!putRes.ok){
      const err=await putRes.json();
      if(putRes.status===409||putRes.status===422){ _htmlSHA=null; btn.textContent='↑ Deploy Layout'; btn.disabled=false; await pushLayout(); return; }
      throw new Error(err.message||putRes.statusText);
    }
    const result=await putRes.json();
    _htmlSHA=result.content.sha;
    btn.textContent='✓ Deployed!';
    setTimeout(()=>{ btn.textContent='↑ Deploy Layout'; btn.disabled=false; },3000);
  } catch(e){
    console.error('Deploy error:',e);
    btn.textContent='✕ Deploy failed';
    btn.disabled=false;
  }
}

/* ── TOKEN MODAL ── */
function openTokenModal(){
  document.getElementById('token-input').value=getToken();
  document.getElementById('token-modal').classList.add('open');
  setTimeout(()=>document.getElementById('token-input').focus(),50);
}
function closeTokenModal(){ document.getElementById('token-modal').classList.remove('open'); }
function saveToken(){
  const t=document.getElementById('token-input').value.trim();
  if(t) localStorage.setItem('gh_token',t);
  closeTokenModal();
  // Test it by pushing if there are pending changes
  if(document.getElementById('save-status').classList.contains('saving')) pushToGitHub();
}
// Close modal on backdrop click
document.getElementById('token-modal').addEventListener('click',function(e){ if(e.target===this) closeTokenModal(); });
// Enter key in token input
document.getElementById('token-input').addEventListener('keydown',function(e){ if(e.key==='Enter') saveToken(); });

if(_defaultIdx !== -1) selectBuilder(_defaultIdx);
